<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FraudGuard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        .login-card {
            background: #1e293b;
            border-radius: 8px;
            padding: 2rem;
            border: 1px solid #334155;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo {
            width: 60px;
            height: 60px;
            background: #f59e0b;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #0f172a;
            margin: 0 auto 1rem;
        }
        .login-title {
            font-size: 1.75rem;
            color: #f59e0b;
            margin-bottom: 0.5rem;
        }
        .login-subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .tab-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: #0f172a;
            padding: 0.25rem;
            border-radius: 6px;
        }
        .tab-btn {
            flex: 1;
            padding: 0.6rem;
            background: transparent;
            border: none;
            border-radius: 4px;
            color: #94a3b8;
            font-weight: 600;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #f59e0b;
            color: #0f172a;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
        }
        .input-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            font-size: 0.95rem;
            border: 1px solid #334155;
            border-radius: 6px;
            background: #0f172a;
            color: #e2e8f0;
            box-sizing: border-box;
        }
        .form-input:focus {
            outline: none;
            border-color: #f59e0b;
        }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
        }
        .forgot-link {
            color: #f59e0b;
            text-decoration: none;
        }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #f59e0b;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            background: #d97706;
        }
        .demo-credentials {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #0f172a;
            border-radius: 6px;
            border: 1px solid #334155;
        }
        .demo-title {
            color: #f59e0b;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        .demo-item {
            color: #94a3b8;
            font-size: 0.85rem;
            padding: 0.25rem 0;
            font-family: monospace;
        }
        .error-message {
            background: #7f1d1d;
            color: #fecaca;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            border: 1px solid #b91c1c;
            display: none;
        }
        .error-message.show { display: block; }
        .register-prompt {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #334155;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .register-prompt a {
            color: #f59e0b;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link {
            text-align: center;
            margin-top: 1rem;
        }
        .back-link a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Login to your account</p>
            </div>

            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('user')">User</button>
                <button class="tab-btn" onclick="switchTab('admin')">Admin</button>
            </div>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials</span>
            </div>

            <!-- User Login -->
            <div class="tab-content active" id="userTab">
                <form onsubmit="handleLogin(event, 'user')">
                    <div class="form-group">
                        <label class="form-label">Email or Username</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-input" id="userIdentifier" placeholder="user@example.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-input" id="userPassword" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn" id="userLoginBtn">Login</button>
                </form>
            </div>

            <!-- Admin Login -->
            <div class="tab-content" id="adminTab">
                <form onsubmit="handleLogin(event, 'admin')">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user-shield input-icon"></i>
                            <input type="text" class="form-input" id="adminIdentifier" placeholder="admin" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-input" id="adminPassword" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox"> Remember me
                        </label>
                    </div>
                    <button type="submit" class="btn" id="adminLoginBtn">Login</button>
                </form>
            </div>

            <div class="demo-credentials">
                <div class="demo-title"><i class="fas fa-info-circle"></i> Demo Accounts</div>
                <div class="demo-item">User: user@example.com / user123</div>
                <div class="demo-item">Admin: a****n / a*****3</div>
            </div>

            <div class="register-prompt">
                Don't have an account? <a href="{{ url_for('register') }}">Sign up</a>
            </div>

            <div class="back-link">
                <a href="{{ url_for('home') }}"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            hideError();
        }

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMessage').classList.add('show');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        async function handleLogin(e, role) {
            e.preventDefault();
            hideError();

            const identifier = role === 'user' 
                ? document.getElementById('userIdentifier').value 
                : document.getElementById('adminIdentifier').value;
            const password = role === 'user' 
                ? document.getElementById('userPassword').value 
                : document.getElementById('adminPassword').value;
            
            const btn = document.getElementById(role === 'user' ? 'userLoginBtn' : 'adminLoginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    showError(data.message || 'Invalid credentials');
                    btn.disabled = false;
                    btn.innerHTML = 'Login';
                }
            } catch (error) {
                showError('Network error. Please try again.');
                btn.disabled = false;
                btn.innerHTML = 'Login';
            }
        }
    </script>
</body>
</html>
