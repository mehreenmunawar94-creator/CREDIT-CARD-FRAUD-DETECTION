<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts - FraudGuard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
        .app-container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #1e293b;
            border-right: 1px solid #334155;
            padding: 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #334155;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: #f59e0b;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f172a;
        }
        .sidebar-nav { list-style: none; }
        .nav-item { margin-bottom: 0.5rem; }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .nav-link:hover {
            background: #334155;
            color: #f59e0b;
        }
        .nav-link.active {
            background: #f59e0b;
            color: #0f172a;
        }
        .nav-icon { width: 20px; }
        .nav-badge {
            margin-left: auto;
            background: #ef4444;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 999px;
            font-size: 0.75rem;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-title {
            font-size: 2rem;
            color: #f59e0b;
        }
        .page-subtitle {
            color: #94a3b8;
            margin-top: 0.25rem;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #f59e0b;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f172a;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            overflow: hidden;
        }
        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-avatar .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f59e0b;
        }
        .user-details {
            line-height: 1.4;
        }
        .user-name {
            font-weight: 600;
            color: #f59e0b;
        }
        .user-role {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .logout-btn {
            background: #334155;
            color: #e2e8f0;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: #f59e0b;
            color: #0f172a;
        }
        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }
        .filter-bar {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .filter-label {
            color: #94a3b8;
            font-size: 0.875rem;
        }
        .form-select {
            padding: 0.5rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 4px;
            color: #e2e8f0;
        }
        .alert-item {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }
        .alert-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .alert-icon.high { background: #ef444420; color: #ef4444; }
        .alert-icon.medium { background: #f59e0b20; color: #f59e0b; }
        .alert-icon.low { background: #10b98120; color: #10b981; }
        .alert-content { flex: 1; }
        .alert-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .alert-message {
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }
        .alert-meta {
            display: flex;
            gap: 1.5rem;
            font-size: 0.85rem;
            color: #64748b;
        }
        .alert-actions {
            display: flex;
            gap: 0.5rem;
        }
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-danger { background: #ef4444; color: white; }
        .badge-success { background: #10b981; color: white; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
                <span style="font-size: 1.25rem; font-weight: 700;">FraudGuard</span>
            </div>
            <nav>
                <ul class="sidebar-nav">
                    <li class="nav-item"><a href="{{ url_for('home') }}" class="nav-link"><i class="fas fa-home nav-icon"></i>Home</a></li>
                    <li class="nav-item"><a href="{{ url_for('dashboard') }}" class="nav-link"><i class="fas fa-chart-pie nav-icon"></i>Dashboard</a></li>
                    <li class="nav-item"><a href="{{ url_for('transactions') }}" class="nav-link"><i class="fas fa-credit-card nav-icon"></i>Transactions</a></li>
                    <li class="nav-item"><a href="{{ url_for('analytics') }}" class="nav-link"><i class="fas fa-chart-line nav-icon"></i>Reports</a></li>
                    <li class="nav-item"><a href="{{ url_for('models') }}" class="nav-link"><i class="fas fa-brain nav-icon"></i>ML Models</a></li>
                    <li class="nav-item"><a href="{{ url_for('alerts') }}" class="nav-link active"><i class="fas fa-bell nav-icon"></i>Alerts<span class="nav-badge">3</span></a></li>
                    <li class="nav-item"><a href="{{ url_for('user_management') }}" class="nav-link"><i class="fas fa-users-cog nav-icon"></i>User Management</a></li>
                    <li class="nav-item"><a href="{{ url_for('settings') }}" class="nav-link"><i class="fas fa-cog nav-icon"></i>Settings</a></li>
                    <li class="nav-item"><a href="{{ url_for('more') }}" class="nav-link"><i class="fas fa-ellipsis-h nav-icon"></i>More</a></li>
                    <li class="nav-item"><a href="#" onclick="handleLogout()" class="nav-link"><i class="fas fa-sign-out-alt nav-icon"></i>Logout</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-title">Fraud Alerts</h1>
                    <p class="page-subtitle">Real-time fraud notifications</p>
                </div>
                <div class="user-info">
                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar" onclick="openProfileModal()">
                            <div class="avatar-placeholder" id="avatarPlaceholder">
                                <i class="fas fa-user"></i>
                            </div>
                            <img id="avatarImage" src="" style="display: none;" alt="Profile">
                        </div>
                        <div class="user-details">
                            <div class="user-name" id="userNameDisplay">Admin User</div>
                            <div class="user-role" id="userRoleDisplay">Administrator</div>
                        </div>
                    </div>
                    <button class="logout-btn" onclick="handleLogout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </header>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label class="filter-label">Severity:</label>
                    <select class="form-select" id="severityFilter">
                        <option value="all">All</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Status:</label>
                    <select class="form-select" id="statusFilter">
                        <option value="all">All</option>
                        <option value="new">New</option>
                        <option value="reviewed">Reviewed</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="applyFilters()">Apply</button>
                <button class="btn btn-secondary" onclick="markAllReviewed()">Mark All Reviewed</button>
            </div>

            <!-- Alerts List -->
            <div id="alertsList"></div>
        </main>
    </div>

    <!-- Profile Modal (same as before) -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal">
            <div class="modal-header">
                <h3 style="color: #f59e0b;">Profile Picture</h3>
                <button class="modal-close" onclick="closeProfileModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <div style="width: 120px; height: 120px; border-radius: 50%; background: #f59e0b; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; overflow: hidden;" id="modalAvatarPreview">
                        <div style="font-size: 3rem; color: #0f172a;" id="modalAvatarPlaceholder">
                            <i class="fas fa-user"></i>
                        </div>
                        <img id="modalAvatarImage" src="" style="display: none; width: 100%; height: 100%; object-fit: cover;">
                    </div>
                </div>
                <form id="profileImageForm" onsubmit="updateProfileImage(event)">
                    <div class="form-group">
                        <label class="form-label">Choose Image</label>
                        <input type="file" class="form-input" id="profileImage" accept="image/*" required>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeProfileModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Upload</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .modal-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .form-group { margin-bottom: 1rem; }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
        }
    </style>

    <script src="{{ url_for('static', filename='js/mockData.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        let alerts = [];

        // Load user info
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/user/current');
                const data = await response.json();
                if (data.name) {
                    document.getElementById('userNameDisplay').textContent = data.name;
                    document.getElementById('userRoleDisplay').textContent = 
                        data.role === 'admin' ? 'Administrator' : 'User';
                    
                    const savedImage = localStorage.getItem(`profile_${data.id}`);
                    if (savedImage) {
                        document.getElementById('avatarImage').src = savedImage;
                        document.getElementById('avatarImage').style.display = 'block';
                        document.getElementById('avatarPlaceholder').style.display = 'none';
                    }
                }
            } catch (e) {}
        }

        // Logout function
        async function handleLogout() {
            try {
                const response = await fetch('/api/logout', { method: 'POST' });
                const data = await response.json();
                if (data.success) window.location.href = data.redirect;
            } catch (e) {
                window.location.href = '/';
            }
        }

        // Profile modal functions
        function openProfileModal() {
            document.getElementById('profileModal').classList.add('active');
        }
        function closeProfileModal() {
            document.getElementById('profileModal').classList.remove('active');
        }
        async function updateProfileImage(event) {
            event.preventDefault();
            const file = document.getElementById('profileImage').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const userResponse = await fetch('/api/user/current');
                const userData = await userResponse.json();
                
                localStorage.setItem(`profile_${userData.id}`, e.target.result);
                
                document.getElementById('avatarImage').src = e.target.result;
                document.getElementById('avatarImage').style.display = 'block';
                document.getElementById('avatarPlaceholder').style.display = 'none';
                
                closeProfileModal();
                alert('Profile picture updated!');
            };
            reader.readAsDataURL(file);
        }

        // Load alerts
        function loadAlerts() {
            alerts = MockData.generateAlerts(20);
            renderAlerts(alerts);
        }

        function renderAlerts(alertsToRender) {
            const container = document.getElementById('alertsList');
            
            if (alertsToRender.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 3rem; color: #64748b;">No alerts found</div>';
                return;
            }

            container.innerHTML = alertsToRender.map(alert => `
                <div class="alert-item">
                    <div class="alert-icon ${alert.severity}">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <div class="alert-content">
                        <div class="alert-title">${alert.type}</div>
                        <div class="alert-message">${alert.message}</div>
                        <div class="alert-meta">
                            <span><i class="far fa-clock"></i> ${Utils.formatTimeAgo(alert.timestamp)}</span>
                            <span><i class="fas fa-credit-card"></i> $${alert.transaction.amount}</span>
                            <span><i class="fas fa-store"></i> ${alert.transaction.merchant}</span>
                        </div>
                    </div>
                    <div class="alert-actions">
                        <span class="badge ${alert.status === 'New' ? 'badge-danger' : 'badge-success'}">${alert.status}</span>
                        <button class="btn btn-secondary btn-sm" onclick="viewAlert('${alert.id}')">
                            <i class="fas fa-eye"></i>
                        </button>
                        ${alert.status === 'New' ? 
                            `<button class="btn btn-success btn-sm" onclick="markReviewed('${alert.id}')">
                                <i class="fas fa-check"></i>
                            </button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function applyFilters() {
            const severity = document.getElementById('severityFilter').value;
            const status = document.getElementById('statusFilter').value;

            const filtered = alerts.filter(alert => {
                if (severity !== 'all' && alert.severity !== severity) return false;
                if (status !== 'all' && alert.status.toLowerCase() !== status) return false;
                return true;
            });

            renderAlerts(filtered);
        }

        function markReviewed(alertId) {
            const alert = alerts.find(a => a.id === alertId);
            if (alert) {
                alert.status = 'Reviewed';
                applyFilters();
            }
        }

        function markAllReviewed() {
            alerts.forEach(a => a.status = 'Reviewed');
            applyFilters();
        }

        function viewAlert(alertId) {
            alert(`Viewing alert: ${alertId}`);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
            loadAlerts();
        });
    </script>
</body>
</html>
