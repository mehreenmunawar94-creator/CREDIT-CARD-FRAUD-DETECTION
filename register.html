<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FraudGuard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
        }
        .register-card {
            background: #1e293b;
            border-radius: 8px;
            padding: 2rem;
            border: 1px solid #334155;
        }
        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .register-logo {
            width: 60px;
            height: 60px;
            background: #f59e0b;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #0f172a;
            margin: 0 auto 1rem;
        }
        .register-title {
            font-size: 1.75rem;
            color: #f59e0b;
            margin-bottom: 0.5rem;
        }
        .register-subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
        }
        .input-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            font-size: 0.95rem;
            border: 1px solid #334155;
            border-radius: 6px;
            background: #0f172a;
            color: #e2e8f0;
            box-sizing: border-box;
        }
        .form-input:focus {
            outline: none;
            border-color: #f59e0b;
        }
        .password-strength {
            margin-top: 0.4rem;
            height: 4px;
            background: #334155;
            border-radius: 2px;
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .password-strength-bar.weak { background: #ef4444; width: 33%; }
        .password-strength-bar.medium { background: #f59e0b; width: 66%; }
        .password-strength-bar.strong { background: #10b981; width: 100%; }
        .terms-check {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1.25rem 0;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .terms-check input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .terms-check a {
            color: #f59e0b;
            text-decoration: none;
        }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #f59e0b;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            background: #d97706;
        }
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .login-link a {
            color: #f59e0b;
            text-decoration: none;
            font-weight: 600;
        }
        .error-message {
            background: #7f1d1d;
            color: #fecaca;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1.25rem;
            border: 1px solid #b91c1c;
            display: none;
        }
        .error-message.show { display: block; }
        .success-message {
            background: #064e3b;
            color: #a7f3d0;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1.25rem;
            border: 1px solid #059669;
            display: none;
        }
        .success-message.show { display: block; }
        .back-link {
            text-align: center;
            margin-top: 1rem;
        }
        .back-link a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
        }
        small {
            color: #64748b;
            display: block;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <div class="register-logo">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1 class="register-title">Create Account</h1>
                <p class="register-subtitle">Join FraudGuard to protect your transactions</p>
            </div>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Registration failed</span>
            </div>

            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i>
                <span id="successText">Account created! Redirecting...</span>
            </div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-input" id="firstName" placeholder="John" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-input" id="lastName" placeholder="Doe" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-at input-icon"></i>
                        <input type="text" class="form-input" id="username" placeholder="johndoe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-input" id="password" placeholder="••••••••" onkeyup="checkPasswordStrength()" required>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="passwordStrength"></div>
                    </div>
                    <small>Min 8 chars, 1 uppercase, 1 number</small>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Phone (Optional)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" class="form-input" id="phone" placeholder="+1 234 567 8900">
                    </div>
                </div>

                <div class="terms-check">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></label>
                </div>

                <button type="submit" class="btn" id="registerBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="login-link">
                Already have an account? <a href="{{ url_for('login') }}">Sign In</a>
            </div>

            <div class="back-link">
                <a href="{{ url_for('home') }}"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('passwordStrength');
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            
            strengthBar.className = 'password-strength-bar';
            if (strength === 0) strengthBar.style.width = '0%';
            else if (strength <= 1) strengthBar.classList.add('weak');
            else if (strength === 2) strengthBar.classList.add('medium');
            else strengthBar.classList.add('strong');
        }

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMessage').classList.add('show');
            setTimeout(() => {
                document.getElementById('errorMessage').classList.remove('show');
            }, 5000);
        }

        function showSuccess(msg) {
            document.getElementById('successText').textContent = msg;
            document.getElementById('successMessage').classList.add('show');
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const phone = document.getElementById('phone').value;
            const terms = document.getElementById('terms').checked;

            if (!terms) {
                showError('You must agree to the Terms of Service');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }

            const registerBtn = document.getElementById('registerBtn');
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        firstName, lastName, email, username, password, phone,
                        registeredAt: new Date().toISOString()
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('Account created! Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showError(data.message || 'Registration failed');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                }
            } catch (error) {
                showError('Network error. Please try again.');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        });
    </script>
</body>
</html>
